services:
  - type: web
    name: brandgen-ai
    env: node
    region: oregon
    buildCommand: npm install && cd backend && npm install && cd .. && npm run build
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_SECONDARY
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_API_KEY_4
        sync: false
      - key: GOOGLE_IMAGEN_API_KEY
        sync: false
