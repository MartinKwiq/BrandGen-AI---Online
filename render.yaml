services:
  - type: web
    name: brandgen-ai
    env: node
    region: oregon
    buildCommand: npm install && cd backend && npm install && cd .. && npm run build
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_SECONDARY
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_API_KEY_4
        sync: false
      - key: GOOGLE_IMAGEN_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        # IMPORTANTE: Esta debe ser la service_role key (sb_secret_...), NO la clave pública.
        # Se obtiene en: Supabase Dashboard → Project Settings → API → service_role key
        sync: false
      - key: IMAGE_API_PRIMARY_KEY
        sync: false
      - key: IMAGE_API_FALLBACK_KEY
        sync: false
